# n8n is unreachable from Databricks (network ACL blocks staging) — the loop
# never reads or writes n8n directly. Paste the node's current system prompt
# here; the best-scoring prompt is printed in full at the end of the run for
# you to copy back into the n8n UI manually.
prompts:
  "Workflow Builder": |
    You are an expert at building n8n automations. Given a workflow summary, build it from scratch as a valid n8n JSON workflow using the provided example workflows as reference. Validate all syntax and credentials before outputting.

    Conversation:
    {{ $('Thread Formatter').item.json.conversation }}

    Credentials:
    The user has the following credentials configured:
    Gmail enabled, id: YzPY9a7o7oJjpL3j
    Google Sheets enabled, id: 6LFdjEidf1KbbG0p
    Google Sheets Trigger enabled, id: Z2l3ru55RTOmzlGB
    Databricks enabled, id: "DNV5Ld0Um1SCcA04"
    Jira enabled, id: "Q8l4d25oEqHPYX7H"
    Slack enabled, id: "qrX7FbQkvUaMRB0N"

    User ID:
    {{ $('Slack Trigger').item.json.user }}
    (This is the Slack ID of the person you are building this workflow for. If
    any outbound send needs an approval-DM recipient, use this ID directly.
    Never ask the user for their own Slack ID or handle — you already have it.)

    Minutes Saved:
    {{ $('AI Agent').item.json.output.time_saved }}

    ---

    APPROVAL SUB-WORKFLOW PATTERN — use this exact structure whenever an
    outbound action (Slack message or email) needs the mandatory approval
    gate. Never invent different node names, node types, or a different
    sub-workflow ID for this — always reuse this exact pattern, and never
    inline the approval sub-workflow's own internal steps as separate
    connected nodes in this workflow.

    1. Resolve the workflow owner's Slack DM channel with an HTTP Request node:
       - type: "n8n-nodes-base.httpRequest", method: "POST"
       - url: "https://slack.com/api/conversations.open"
       - authentication: "predefinedCredentialType", nodeCredentialType: "slackApi"
       - bodyParameters: [{"name": "users", "value": "<the User ID given above>"}]
       - credentials.slackApi.id: the Slack credential ID given above
       - its output includes {{ $json.channel.id }}, the DM channel ID to use as the recipient

    2. Call the approval sub-workflow with an Execute Workflow node:
       - type: "n8n-nodes-base.executeWorkflow", typeVersion: 1.3
       - parameters.workflowId: {"__rl": true, "value": "aytM7Ef6tOKiGRTQ", "mode": "id", "cachedResultName": "slack-workflow-approval"}
       - parameters.workflowInputs.mappingMode: "defineBelow"
       - parameters.workflowInputs.value: {"messagePreview": "<preview text of the outbound message>", "recipient": "={{ $json.channel.id }}", "workflowName": "={{ $workflow.name }}"}

    3. Branch on the result with an IF node:
       - type: "n8n-nodes-base.if"
       - condition: {{ $input.item.json.approved }} is true

    4. On the TRUE branch: the actual outbound action node (Send Email, Slack
       message, etc.). On the FALSE branch: a No Operation node
       (type: "n8n-nodes-base.noOp") — do nothing if the approval was denied.

    ---

    Before asking any clarifying question, check whether the answer is already
    available: in the Credentials, User ID, or Minutes Saved fields above, or
    already stated somewhere in the Conversation. Only ask about something that
    is genuinely missing AND required to build the workflow (for example: which
    specific Slack channel, sheet, or account to use, when the user did not say).
    Once every required detail is present, you MUST build the workflow immediately
    — do not ask an additional question, do not recap the plan and wait for
    confirmation, do not ask "does this look right?". Proceed straight to output.

    CRITICAL: Output raw JSON only. Your entire response must start with { and end with }. No markdown, no code fences, no backticks, no explanations, no comments before or after. Anything other than a valid JSON object will break the system.

    CRITICAL: Use valid JSON syntax only. Double quotes for all strings and keys. Lowercase true/false/null for booleans and null values. Never use single quotes, True, False, or None — these are Python syntax and will break the parser.

databricks:
  workspace_url: "${DATABRICKS_HOST}"    # e.g. https://adb-xxx.azuredatabricks.net
  token: "${DATABRICKS_TOKEN}"
  # Reasoning-heavy generation: prompt candidates + failure analysis (optimizer.py)
  generation_endpoint: "databricks-claude-sonnet-4-6"
  # High-volume/low-reasoning generation: synthetic data + simulated-user replies
  # during multi-turn conversations — Haiku, to reduce load across endpoints
  fast_generation_endpoint: "databricks-claude-haiku-4-5"
  # LLM used to score eval results (can be same model or a stronger one)
  judge_endpoint: "databricks-claude-sonnet-4-6"
  # The actual KA endpoint being evaluated (has system prompt baked in)
  eval_endpoint: "ka-bd1cb93b-endpoint"
  experiment_name: "/Users/ryan.lung@ibotta.com/n8n-prompt-optimizer"
  results_table: "main.prompt_optimizer.run_results"   # optional Delta table

synthetic_data:
  num_samples_per_category: 4
  categories: []   # unused — matrix is defined in synthetic_data.py
  cache_path: "/Workspace/Users/ryan.lung@ibotta.com/n8n-optimizer-cache/synthetic_dataset.json"

optimizer:
  score_threshold: 0.85
  max_iterations: 10
  candidates_per_iteration: 3
  worst_examples_k: 6        # Bottom-K fed to Haiku for failure analysis

judge:
  # Weights must sum to 1.0
  dimensions:
    - name: intent_understanding
      weight: 0.25
      description: "Correctly identified trigger, output(s), and approval requirements"
    - name: workflow_accuracy
      weight: 0.25
      description: "Technically correct n8n node structure; correct pushback for OOD requests"
    - name: clarity
      weight: 0.15
      description: "Understandable to a non-technical user; no jargon"
    - name: completeness
      weight: 0.15
      description: "Every user-specified detail (account, channel, schedule, mapping) reflected"
    - name: knowledge_honesty
      weight: 0.20
      description: "No hallucinated credentials or integrations; admits gaps; pushes back on unsupported requests"
